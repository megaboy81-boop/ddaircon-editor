const banners=[
  {key:'side', name:'측면', D:{W:2050,H:230}, stage:document.getElementById('stageSide'), def:DEF_SIDE},
  {key:'rear', name:'후면', D:{W:1490,H:230}, stage:document.getElementById('stageRear'), def:DEF_REAR}
];
let selected=null; // {bn, id}
banners.forEach(bn=>{
  bn.stage.style.background='#fff';
  bn.layers=JSON.parse(JSON.stringify(bn.def));
  bn.els={};
  bn.topBand=document.createElement('div'); bn.botBand=document.createElement('div');
  [bn.topBand,bn.botBand].forEach(b=>{b.style.position='absolute';b.style.left='0';b.style.right='0';b.style.height=(BAND/bn.D.H*100)+'%';b.style.pointerEvents='none';b.style.zIndex='1';bn.stage.appendChild(b);});
  bn.topBand.style.top='0'; bn.botBand.style.bottom='0';
  bn.stage.addEventListener('pointerdown',e=>{if(e.target===bn.stage)select(null);});
});
function applyBands(){banners.forEach(bn=>{bn.topBand.style.background=BANDS[bandColor];bn.botBand.style.background=BANDS[bandColor];});}
function build(bn){
  bn.stage.querySelectorAll('.lyr,.txt').forEach(e=>e.remove());
  for(const L of bn.layers){
    let el;
    if(L.type==='img'){el=document.createElement('img');el.className='lyr';el.src=srcOf(L);el.draggable=false;}
    else{el=document.createElement('div');el.className='txt';if(L.type==='text')el.textContent=L.text;}
    el.dataset.id=L.id;
    el.addEventListener('pointerdown',e=>startDrag(e,bn,L.id));
    bn.stage.appendChild(el);bn.els[L.id]=el;
  }
  relayout(bn);
}
function relayout(bn){
  const cw=bn.stage.clientWidth, sf=cw/bn.D.W;
  for(const L of bn.layers){
    const el=bn.els[L.id];
    el.style.left=(L.x/bn.D.W*100)+'%';
    el.style.top=(L.y/bn.D.H*100)+'%';
    if(L.type==='img'){el.style.width=(L.w*L.scale/bn.D.W*100)+'%';el.style.height='auto';}
    else if(L.type==='rule'){el.style.width=(L.w*L.scale/bn.D.W*100)+'%';el.style.height=(L.h*L.scale/bn.D.H*100)+'%';el.style.background=L.color;el.style.borderRadius='2px';}
    else{el.style.fontFamily=FAM;el.style.fontWeight=L.weight;el.style.color=L.color;el.style.lineHeight='1';el.style.whiteSpace='pre';el.style.letterSpacing='-1px';el.style.fontSize=(L.fontPx*L.scale*sf)+'px';el.textContent=L.text;}
    const isSel=selected&&selected.bn===bn&&selected.id===L.id;
    el.classList.toggle('sel',isSel);
    el.style.zIndex=(isSel?50:10);
  }
}
function relayoutAll(){banners.forEach(relayout);}
function startDrag(e,bn,id){
  e.preventDefault();e.stopPropagation();
  select(bn,id);
  const L=bn.layers.find(l=>l.id===id);
  const sf=bn.stage.clientWidth/bn.D.W;
  const sx=e.clientX,sy=e.clientY,ox=L.x,oy=L.y;
  function mv(ev){L.x=ox+(ev.clientX-sx)/sf;L.y=oy+(ev.clientY-sy)/sf;relayout(bn);}
  function up(){window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);}
  window.addEventListener('pointermove',mv);window.addEventListener('pointerup',up);
}
const selName=document.getElementById('selName'),textRow=document.getElementById('textRow'),sizeRow=document.getElementById('sizeRow'),textInput=document.getElementById('textInput'),sizeRange=document.getElementById('sizeRange'),sizePct=document.getElementById('sizePct');
function curLayer(){return selected?selected.bn.layers.find(l=>l.id===selected.id):null;}
function select(bn,id){
  selected=(bn&&id)?{bn,id}:null;
  const L=curLayer();
  selName.textContent=L?(selected.bn.name+' · '+L.label):'없음 (요소를 클릭하세요)';
  selName.style.color=L?'#0e74c9':'#9aa7b4';
  const isText=L&&L.type==='text';
  textRow.classList.toggle('disabled',!isText);
  textInput.disabled=!isText;textInput.value=isText?L.text:'';
  sizeRow.classList.toggle('disabled',!L);
  sizeRange.disabled=!L;sizeRange.value=L?L.scale:1;sizePct.textContent=Math.round((L?L.scale:1)*100)+'%';
  relayoutAll();
}
textInput.addEventListener('input',()=>{const L=curLayer();if(!L)return;L.text=textInput.value;relayout(selected.bn);});
sizeRange.addEventListener('input',()=>{const L=curLayer();if(!L)return;L.scale=Number(sizeRange.value);sizePct.textContent=Math.round(L.scale*100)+'%';relayout(selected.bn);});
document.getElementById('resetBtn').addEventListener('click',()=>{banners.forEach(bn=>{bn.layers=JSON.parse(JSON.stringify(bn.def));build(bn);});select(null);});
function loadImg(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src;});}
async function renderBanner(bn,SC){
  const c=document.createElement('canvas');c.width=bn.D.W*SC;c.height=bn.D.H*SC;
  const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  const bh=BAND*SC;ctx.fillStyle=BANDS[bandColor];ctx.fillRect(0,0,c.width,bh);ctx.fillRect(0,c.height-bh,c.width,bh);
  for(const L of bn.layers){
    if(L.type==='img'){const im=await loadImg(srcOf(L));const dw=L.w*L.scale*SC;const dh=dw*(im.naturalHeight/im.naturalWidth);ctx.drawImage(im,L.x*SC,L.y*SC,dw,dh);}
    else if(L.type==='rule'){ctx.fillStyle=L.color;ctx.fillRect(L.x*SC,L.y*SC,L.w*L.scale*SC,L.h*L.scale*SC);}
    else{ctx.font=L.weight+' '+(L.fontPx*L.scale*SC)+'px '+FAM;ctx.fillStyle=L.color;ctx.textBaseline='top';ctx.textAlign='left';ctx.fillText(L.text,L.x*SC,L.y*SC);}
  }
  return c;
}
function dl(c,name){return new Promise(res=>{c.toBlob(b=>{const url=URL.createObjectURL(b);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),5000);res();},'image/png');});}
document.getElementById('saveBtn').addEventListener('click',async()=>{
  const st=document.getElementById('status');st.textContent='이미지 생성 중…';
  try{
    const SC=2;
    for(let i=0;i<banners.length;i++){const bn=banners[i];const c=await renderBanner(bn,SC);await dl(c,'DD_배너_'+bn.name+'_'+bn.D.W+'x'+bn.D.H+'.png');if(i<banners.length-1)await new Promise(r=>setTimeout(r,700));}
    st.textContent='저장 완료 ✓ (측면 + 후면 2장)';
  }catch(err){st.textContent='오류: '+(err&&err.message?err.message:err);}
});
banners.forEach(build);
applyBands();
function refreshOpts(){document.querySelectorAll('[data-band]').forEach(b=>b.classList.toggle('on',b.dataset.band===bandColor));document.querySelectorAll('[data-logo]').forEach(b=>b.classList.toggle('on',b.dataset.logo===logoChoice));}
document.querySelectorAll('[data-band]').forEach(b=>b.addEventListener('click',()=>{bandColor=b.dataset.band;applyBands();refreshOpts();}));
document.querySelectorAll('[data-logo]').forEach(b=>b.addEventListener('click',()=>{logoChoice=b.dataset.logo;banners.forEach(bn=>{if(bn.els.ddLogo)bn.els.ddLogo.src=LOGOS[logoChoice];relayout(bn);});refreshOpts();}));
refreshOpts();
window.addEventListener('resize',relayoutAll);
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(relayoutAll);
</script>
